<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porty - Finansal Özgürlüğe Adım At</title>
    <meta name="description" content="Yatırımlarını tek bir yerden takip et, hedeflerine ulaş. Porty ile finansal geleceğini yönet.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="container">
        <header class="logo-container">
            <img src="logo.png" alt="Porty Logo" class="logo">
        </header>

        <section class="content-card">
            <h1 class="highlight">Hemen İndir</h1>
            <p>Yatırımlarını tek bir yerden takip et, hedeflerine ulaş. Porty ile finansal geleceğini yönetmeye hemen başla.</p>
            
            <div id="desktop-view" class="desktop-only">
                <div class="qr-wrapper">
                    <div id="qrcode"></div>
                </div>
                <p class="qr-text">Uygulamayı indirmek için QR kodu taratın</p>
            </div>

            <div class="store-buttons">
                <a href="https://apps.apple.com/tr/app/porty-finance/id6761659554" class="badge-link" id="ios-link">
                    <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/tr-tr?size=250x83" alt="App Store'dan İndirin" class="store-badge">
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.porty.app&hl=en" class="badge-link" id="android-link">
                    <img src="https://play.google.com/intl/en_us/badges/static/images/badges/tr_badge_web_generic.png" alt="Google Play'den Alın" class="store-badge play-store">
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; Porty Finance. Tüm hakları saklıdır.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
